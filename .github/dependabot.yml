version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 20
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-test-renderer"
          - "@types/react"
          - "@types/react-dom"
          - "babel-plugin-react-compiler"
      next:
        patterns:
          - "next"
          - "@next/*"
          - "next-router-mock"
      react-router:
        patterns:
          - "react-router"
          - "@react-router/*"
          - "remix-*"
      tanstack:
        patterns:
          - "@tanstack/*"
      unit-testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "@types/jest"
          - "babel-jest"
          - "jest"
          - "jest-environment-jsdom"
          - "jsdom"
          - "happy-dom"
          - "zocker"
          - "cross-fetch"
      browser-testing:
        patterns:
          - "playwright"
          - "@playwright/*"
          - "msw"
          - "@msw/*"
          - "@axe-core/*"
          - "playwright-lighthouse"
          - "lighthouse"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "@eslint-react/*"
          - "typescript-eslint"
          - "globals"
      styling:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "postcss"
          - "class-variance-authority"
          - "clsx"
          - "tailwind-merge"
      formatting:
        patterns:
          - "prettier"
          - "prettier-plugin-*"
      i18n:
        patterns:
          - "i18next"
          - "i18next-*"
          - "react-i18next"
      radix:
        patterns:
          - "@radix-ui/*"
      build-tools:
        patterns:
          - "vite"
          - "vite-*"
          - "@vitejs/*"
          - "typescript"
          - "@types/node"
          - "@babel/*"
          - "dpdm"
          - "turbo"
          - "tsdown"
          - "@rsbuild/*"
          - "@arethetypeswrong/*"
          - "agadoo"
      form-handling:
        patterns:
          - "react-hook-form"
          - "@hookform/*"
          - "zod"
      publishing:
        patterns:
          - "@changesets/*"
      react-native:
        patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"
          - "jest-expo"
          - "babel-preset-expo"
          - "react-native"
          - "react-native-*"
          - "@react-native/*"
          - "@react-navigation/*"
      dev-tools:
        patterns:
          - "husky"
          - "lint-staged"
          - "is-ci"
          - "bundlesize2"
          - "cross-env"
      react-utilities:
        patterns:
          - "lucide-react"
          - "usehooks-ts"
      runtime-utilities:
        patterns:
          - "ky"
          - "dotenv"
          - "isbot"
          - "http-server"
  - package-ecosystem: github-actions
    directory: "/.github/workflows"
    schedule:
      interval: weekly
    open-pull-requests-limit: 20
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: "/templates/next-ssr/.github/workflows"
    schedule:
      interval: weekly
    open-pull-requests-limit: 20
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: "/templates/next-ssr/.github/actions/setup-node-environment"
    schedule:
      interval: weekly
    open-pull-requests-limit: 20
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: "/templates/react-router-v7-spa/.github/workflows"
    schedule:
      interval: weekly
    open-pull-requests-limit: 20
    groups:
      github-actions:
