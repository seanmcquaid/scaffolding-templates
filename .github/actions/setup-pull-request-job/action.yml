name: Pull Request
description: Setup pull request jobs for monorepo workflows

runs:
  using: 'composite'
  steps:
    - name: Checkout repo
      uses: actions/checkout@v6
    - name: Setup PNPM
      uses: pnpm/action-setup@v6
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'pnpm'
    - name: Install Dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
