version: 2

updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 20
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
          - 'react-test-renderer'
      react-native:
        patterns:
          - 'expo'
          - 'expo-*'
          - '@expo/*'
          - 'jest-expo'
          - 'babel-preset-expo'
          - 'react-native'
          - 'react-native-*'
          - '@react-native/*'
          - '@react-navigation/*'
      tanstack:
        patterns:
          - '@tanstack/*'
      unit-testing:
        patterns:
          - '@testing-library/*'
          - '@types/jest'
          - 'babel-jest'
          - 'cross-fetch'
          - 'jest'
          - 'msw'
          - 'zocker'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - '@eslint-react/*'
          - 'typescript-eslint'
          - 'globals'
      formatting:
        patterns:
          - 'prettier'
          - 'prettier-plugin-*'
      styling:
        patterns:
          - 'class-variance-authority'
          - 'clsx'
      i18n:
        patterns:
          - 'i18next'
          - 'i18next-*'
          - 'react-i18next'
      build-tools:
        patterns:
          - 'typescript'
          - '@babel/*'
          - 'dpdm'
      form-handling:
        patterns:
          - 'react-hook-form'
          - '@hookform/*'
          - 'zod'
      react-utilities:
        patterns:
          - 'usehooks-ts'
      runtime-utilities:
        patterns:
          - 'ky'
      dev-tools:
        patterns:
          - 'husky'
          - 'lint-staged'
          - 'is-ci'
          - 'bundlesize2'
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 20
    groups:
      github-actions:
        patterns:
          - '*'
